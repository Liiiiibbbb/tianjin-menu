<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>天津菜点餐系统</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header class="header">
            <h1 class="app-title">天津菜点餐系统</h1>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="搜索菜品...">
                <button class="search-btn" id="searchBtn">🔍</button>
            </div>
        </header>

        <div class="category-nav">
            <div class="category-list" id="categoryList"></div>
        </div>

        <main class="main-content" id="mainContent">
            <div class="page-container">
                <div class="page active" id="menuPage">
                    <div class="dish-grid" id="dishGrid"></div>
                </div>

                <div class="page" id="favoritesPage">
                    <div class="empty-state" id="favoritesEmpty">
                        <div class="empty-icon">❤️</div>
                        <p>还没有收藏的菜品</p>
                    </div>
                    <div class="dish-grid" id="favoritesGrid"></div>
                </div>

                <div class="page" id="cartPage">
                    <div class="cart-header">
                        <h2>购物车</h2>
                        <button class="clear-cart-btn" id="clearCartBtn">清空</button>
                    </div>
                    <div class="empty-state" id="cartEmpty">
                        <div class="empty-icon">🛒</div>
                        <p>购物车是空的</p>
                    </div>
                    <div class="cart-list" id="cartList"></div>
                    <div class="cart-footer" id="cartFooter">
                        <div class="total-info">
                            <span>合计：</span>
                            <span class="total-price" id="totalPrice">¥0</span>
                        </div>
                        <button class="checkout-btn" id="checkoutBtn">一键下单</button>
                    </div>
                </div>

                <div class="page" id="ordersPage">
                    <div class="orders-header">
                        <h2>已点菜品</h2>
                        <div class="header-actions">
                            <button class="share-link-btn" id="shareLinkBtn">分享点餐链接</button>
                            <button class="clear-orders-btn" id="clearOrdersBtn">清空记录</button>
                        </div>
                    </div>
                    <div class="empty-state" id="ordersEmpty">
                        <div class="empty-icon">📝</div>
                        <p>还没有已点的菜品</p>
                    </div>
                    <div class="orders-list" id="ordersList"></div>
                </div>
            </div>
        </main>

        <nav class="bottom-nav">
            <div class="nav-item active" data-page="menu">
                <span class="nav-icon">📋</span>
                <span class="nav-text">菜单</span>
            </div>
            <div class="nav-item" data-page="favorites">
                <span class="nav-icon">❤️</span>
                <span class="nav-text">收藏</span>
                <span class="nav-badge" id="favoritesBadge" style="display: none;">0</span>
            </div>
            <div class="nav-item" data-page="cart">
                <span class="nav-icon">🛒</span>
                <span class="nav-text">购物车</span>
                <span class="nav-badge" id="cartBadge" style="display: none;">0</span>
            </div>
            <div class="nav-item" data-page="orders">
                <span class="nav-icon">📝</span>
                <span class="nav-text">已点</span>
                <span class="nav-badge" id="ordersBadge" style="display: none;">0</span>
            </div>
        </nav>
    </div>

    <!-- 引入 Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>
</html>
